<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFK 게더링</title>
<style>
  :root {
    --hfk-red: #980000;
    --hfk-red-dim: #b53a3a;
    --bg: #fafaf7;
    --card: #ffffff;
    --border: #e5e3dd;
    --text: #1a1a1a;
    --muted: #6b6b66;
    --ok: #2f7d3f;
    --warn: #a86b00;
    --err: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo { font-weight: 700; font-size: 20px; color: var(--hfk-red); }
  .logo small { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .nav { display: flex; gap: 4px; }
  .nav button {
    background: none;
    border: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
    color: var(--muted);
  }
  .nav button.active {
    background: var(--hfk-red);
    color: white;
    border-color: var(--hfk-red);
  }
  main { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h2 { font-size: 22px; margin: 0 0 4px; }
  h3 { font-size: 17px; margin: 0 0 12px; }
  h4 { font-size: 15px; margin: 0 0 8px; color: var(--muted); font-weight: 500; }
  .section-desc { color: var(--muted); font-size: 14px; margin: 0 0 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 700px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }
  .stat-label { color: var(--muted); font-size: 12px; }
  .stat-value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .btn {
    background: var(--hfk-red);
    color: white;
    border: none;
    padding: 10px 18px;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn:hover { background: #7a0000; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #f5f5f0; }
  .btn-ghost { background: none; color: var(--muted); border: none; padding: 4px 8px; font-size: 13px; cursor: pointer; }
  .btn-ghost:hover { color: var(--text); }
  .btn-danger { background: white; color: var(--err); border: 1px solid var(--border); }
  .btn-danger:hover { background: #fdf3f0; }
  .btn-small { padding: 6px 12px; font-size: 13px; }
  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    background: white;
  }
  textarea { min-height: 70px; resize: vertical; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 12px; }
  label.inline { display: inline-flex; align-items: center; gap: 6px; margin: 0 12px 8px 0; cursor: pointer; }
  label.inline input { width: auto; }
  .form-row { margin-bottom: 12px; }
  .radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .radio-card {
    flex: 1;
    min-width: 120px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    cursor: pointer;
    text-align: center;
    background: white;
  }
  .radio-card.selected {
    border-color: var(--hfk-red);
    background: #fdf5f5;
  }
  .radio-card input { display: none; }
  .radio-card-title { font-weight: 500; font-size: 14px; }
  .radio-card-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    font-size: 13px;
    background: white;
    user-select: none;
  }
  .chip.selected {
    background: var(--hfk-red);
    color: white;
    border-color: var(--hfk-red);
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 12px;
    background: #eee;
    color: #555;
    margin-right: 4px;
  }
  .tag-seniority { background: #e8f0f7; color: #2c5876; }
  .tag-job { background: #f0f0e8; color: #5c5c2c; }
  .tag-topic { background: #f7e8ec; color: #762c40; }
  .tag-ok { background: #e0f0e2; color: var(--ok); }
  .tag-warn { background: #f7ecd6; color: var(--warn); }
  .tag-err { background: #f7ded6; color: var(--err); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    padding: 10px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: 500; font-size: 13px; }
  tr:hover { background: #fafaf5; }
  .group-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
    background: #fefefe;
  }
  .group-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .group-title strong { font-size: 15px; }
  .member-list { display: flex; flex-direction: column; gap: 6px; }
  .member-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 14px;
  }
  .member-info { flex: 1; }
  .member-name { font-weight: 500; }
  .member-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .move-select { width: auto; padding: 4px 8px; font-size: 12px; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .toolbar-spacer { flex: 1; }
  .banner {
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .banner-info { background: #eef2f7; color: #2c4a76; }
  .banner-ok { background: #eaf5ec; color: var(--ok); }
  .banner-warn { background: #f7f0e0; color: var(--warn); }
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: white;
    border-radius: 8px;
    max-width: 640px;
    width: 92%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal h3 { margin-top: 0; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }
  .hidden { display: none !important; }
  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  code { background: #f0f0eb; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  .session-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 10px;
    background: white;
  }
  .session-card.selected {
    border-color: var(--hfk-red);
    background: #fdf5f5;
  }
  .session-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .session-card-title { font-size: 16px; font-weight: 600; }
  .session-card-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .session-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>

<header>
  <div class="logo">HFK 게더링 <small>· 신청 및 그룹 매칭</small></div>
  <div class="nav">
    <button id="nav-user" class="active" onclick="setView('user')">사용자</button>
    <button id="nav-admin" onclick="setView('admin')">관리자</button>
  </div>
</header>

<main>
  <div id="view-user"></div>
  <div id="view-admin" class="hidden"></div>
</main>

<div id="modal-root"></div>

<script>
// ===========================================================================
// 도메인 상수
// ===========================================================================
const JOB_LIST = [
  "경영기획","전략","사업기획","사업개발","마케팅","브랜드",
  "영업","제품","서비스 기획","데이터","개발","디자인",
  "인사","조직문화","재무","회계","운영","창업"
];
const JOB_GROUPS = [
  ["경영기획","전략","사업기획","사업개발"],
  ["마케팅","브랜드"],
  ["제품","서비스 기획"],
  ["데이터","개발"],
  ["인사","조직문화"],
  ["재무","회계"],
  ["영업","운영"],
];
const TOPIC_LIST = [
  "리더십","커리어 전환","팀 관리","조직문화","AI 활용","기획력",
  "독립과 창업","사이드 프로젝트","투자와 자산","일과 삶",
  "관계와 네트워크","브랜딩","마케팅","새로운 사업"
];
const TOPIC_CLUSTERS = [
  ["리더십","팀 관리","조직문화"],
  ["커리어 전환","독립과 창업","사이드 프로젝트"],
  ["AI 활용","기획력","새로운 사업"],
  ["브랜딩","마케팅"],
];
const SENIORITY_OPTIONS = [
  {value: "similar", label: "나와 비슷한 연차"},
  {value: "senior", label: "나보다 선배"},
  {value: "junior", label: "나보다 후배"},
  {value: "any", label: "상관 없음"},
];

// ===========================================================================
// 상태 관리
// ===========================================================================
const STORAGE_KEY = "hfk_gathering_state_v2";

function genId(prefix) { return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6); }

function newBlankSession() {
  return {
    id: genId("s"),
    name: "새 게더링",
    date: "",
    time: "",
    location: "",
    intro: "",
    targetGroupSize: 5,
    minGroupSize: 4,
    maxGroupSize: 6,
    applyDeadline: "",
    confirmDate: "",
  };
}

function defaultState() {
  return {
    sessions: [{
      id: "s_default",
      name: "2026 여름 HFK 게더링",
      date: "2026-08-15",
      time: "19:00-21:30",
      location: "성수동 HFK 라운지",
      intro: "비슷한 고민을 가진 멤버들과 5명 단위 소그룹으로 이야기 나누는 저녁 세션입니다.",
      targetGroupSize: 5,
      minGroupSize: 4,
      maxGroupSize: 6,
      applyDeadline: "2026-08-08",
      confirmDate: "2026-08-11",
    }],
    me: null,               // {id, name, email, company} — 이 브라우저 소유자
    applications: [],       // {id, sessionId, applicantId, applicantName, applicantEmail, applicantCompany, ...}
    groups: {},             // {sessionId: [{id, origin, memberIds}]}
    confirmed: {},          // {sessionId: bool}
    drive: {
      webAppUrl: "",
      adminToken: "",
      enabled: false,
      lastSyncAt: null,
      lastSyncResult: null,
    },
  };
}

let state = loadState();
let uiState = {
  applyingSessionId: null,       // 신청 폼 열어둔 세션 id
  editingSessionId: null,        // 관리자 세션 편집 중인 id
  adminSelectedSessionId: null,  // 관리자가 관리 중인 세션 id
  editingProfile: false,         // 내 정보 편집 모드
  filter: {                      // 신청자 검색/필터
    keyword: "",
    criterion: "all",            // all/seniority/job/topic
    groupStatus: "all",          // all/assigned/unassigned
  },
};

function loadState() {
  try {
    // v2 저장소 확인
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      return migrate(s);
    }
    // v1 저장소 확인 → 마이그레이션
    const legacy = localStorage.getItem("hfk_gathering_state_v1");
    if (legacy) {
      const s = JSON.parse(legacy);
      return migrate(s);
    }
  } catch(e) { console.warn("state load error:", e); }
  return defaultState();
}

function migrate(s) {
  // v1: single session → v2: sessions array
  if (s.session && !s.sessions) {
    const sid = s.session.id || "s_default";
    s.sessions = [{...s.session, id: sid}];
    s.applications = (s.applications || []).map(a => ({...a, sessionId: sid}));
    s.groups = s.groups ? {[sid]: s.groups} : {};
    s.confirmed = { [sid]: !!s.confirmed };
    delete s.session;
  }
  // v2: users[]/currentUserId → v3: me + denormalized applications
  if (s.users !== undefined && s.me === undefined) {
    const currentUser = s.users.find(u => u.id === s.currentUserId);
    s.me = currentUser ? { id: currentUser.id, name: currentUser.name, email: "", company: "" } : null;
    s.applications = (s.applications || []).map(a => {
      const u = s.users.find(u => u.id === a.userId);
      return {
        ...a,
        applicantId: a.userId,
        applicantName: u?.name || "(알 수 없음)",
        applicantEmail: "",
        applicantCompany: "",
      };
    });
    delete s.users;
    delete s.currentUserId;
  }
  if (!Array.isArray(s.sessions)) s.sessions = [];
  if (!Array.isArray(s.applications)) s.applications = [];
  if (s.me === undefined) s.me = null;
  if (!s.groups || Array.isArray(s.groups)) s.groups = {};
  if (!s.confirmed || typeof s.confirmed !== "object") s.confirmed = {};
  if (!s.drive) s.drive = defaultState().drive;
  if (s.drive.adminToken === undefined) s.drive.adminToken = "";
  return s;
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ===========================================================================
// 관리자 PIN 잠금 (클라이언트 게이트)
// ===========================================================================
// PIN 해시는 별도 localStorage 키에 저장 (state와 분리, 초기화·마이그레이션 영향 없음)
// 잠금 해제 상태는 sessionStorage에 저장 → 탭 닫으면 다시 PIN 필요
const ADMIN_PIN_KEY = "hfk_admin_pin_hash";
const ADMIN_UNLOCK_KEY = "hfk_admin_unlocked";

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
}
function adminPinExists() { return !!localStorage.getItem(ADMIN_PIN_KEY); }
function isAdminUnlocked() { return sessionStorage.getItem(ADMIN_UNLOCK_KEY) === "1"; }
async function setAdminPin(pin) {
  localStorage.setItem(ADMIN_PIN_KEY, await sha256(pin));
  sessionStorage.setItem(ADMIN_UNLOCK_KEY, "1");
}
async function verifyAdminPin(pin) {
  if ((await sha256(pin)) === localStorage.getItem(ADMIN_PIN_KEY)) {
    sessionStorage.setItem(ADMIN_UNLOCK_KEY, "1");
    return true;
  }
  return false;
}
function lockAdmin() {
  sessionStorage.removeItem(ADMIN_UNLOCK_KEY);
  render();
}
function resetAdminPin() {
  if (!confirm("관리자 PIN을 초기화합니다. 다음 접근 시 새 PIN을 설정하게 됩니다.")) return;
  localStorage.removeItem(ADMIN_PIN_KEY);
  sessionStorage.removeItem(ADMIN_UNLOCK_KEY);
  render();
}
async function changeAdminPin() {
  const oldPin = prompt("현재 PIN을 입력해주세요.");
  if (!oldPin) return;
  if (!(await verifyAdminPin(oldPin))) return alert("현재 PIN이 일치하지 않습니다.");
  const newPin = prompt("새 PIN (4자 이상)");
  if (!newPin || newPin.length < 4) return alert("PIN은 4자 이상이어야 합니다.");
  const confirmPin = prompt("새 PIN 확인");
  if (newPin !== confirmPin) return alert("두 PIN이 일치하지 않습니다.");
  await setAdminPin(newPin);
  alert("PIN이 변경되었습니다.");
  render();
}
function resetState() {
  if (!confirm("모든 데이터를 초기화합니다. 계속하시겠습니까?")) return;
  state = defaultState();
  uiState = { applyingSessionId: null, editingSessionId: null, adminSelectedSessionId: null, editingProfile: false };
  saveState();
  render();
}

// ===========================================================================
// Google Drive 연동
// ===========================================================================
async function postToDrive(payload) {
  const url = state.drive.webAppUrl;
  if (!url) throw new Error("Web App URL이 설정되어 있지 않습니다.");
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
    redirect: "follow",
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

function serializeApp(app) {
  const session = state.sessions.find(s => s.id === app.sessionId);
  return {
    id: app.id,
    sessionId: app.sessionId,
    sessionName: session?.name || "",
    name: app.applicantName || "(이름 없음)",
    email: app.applicantEmail || "",
    company: app.applicantCompany || "",
    seniority: app.seniority,
    currentJob: app.currentJob,
    criterion: app.criterion,
    desiredSeniority: app.desiredSeniority,
    desiredJobs: app.desiredJobs,
    topics: app.topics,
    concern: app.concern,
    experience: app.experience,
    disclose: app.disclose,
    createdAt: app.createdAt,
  };
}

async function pushApplicationToDrive(app) {
  if (!state.drive.enabled || !state.drive.webAppUrl) return;
  try {
    await postToDrive({ type: "application", payload: serializeApp(app) });
  } catch (e) { console.warn("Drive 저장 실패:", e); }
}

async function pushSessionToDrive(session) {
  if (!state.drive.enabled || !state.drive.webAppUrl) return;
  if (!state.drive.adminToken) return; // 토큰 없으면 세션 동기화 스킵 (사용자는 관리자 아니어도 됨)
  try {
    await postToDrive({
      type: "session",
      payload: session,
      adminToken: state.drive.adminToken,
    });
  } catch (e) { console.warn("세션 저장 실패:", e); }
}

async function testDriveConnection() {
  const btn = document.getElementById("drive-test-btn");
  if (btn) { btn.disabled = true; btn.textContent = "테스트 중..."; }
  try {
    const result = await postToDrive({ type: "ping" });
    const tokenNote = result.adminTokenConfigured
      ? "\n서버에 ADMIN_TOKEN이 설정되어 있습니다."
      : "\n⚠️ 서버에 ADMIN_TOKEN이 설정되지 않았습니다. Apps Script 프로젝트 설정 → 스크립트 속성에서 지정해주세요.";
    alert("연결 성공: " + (result.message || "OK") + tokenNote);
  } catch (e) {
    alert("연결 실패: " + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "연결 테스트"; }
  }
}

async function syncAllToDrive() {
  if (!state.drive.adminToken) return alert("관리자 토큰이 필요합니다. Drive 설정에서 토큰을 입력해주세요.");
  const btn = document.getElementById("drive-sync-btn");
  if (btn) { btn.disabled = true; btn.textContent = "전송 중..."; }
  try {
    const result = await postToDrive({
      type: "syncAll",
      adminToken: state.drive.adminToken,
      applications: state.applications.map(serializeApp),
      sessions: state.sessions,
    });
    state.drive.lastSyncAt = new Date().toISOString();
    state.drive.lastSyncResult = `신청 ${result.appCount || 0}건 · 세션 ${result.sessionCount || 0}건 전송`;
    saveState();
    render();
    alert(state.drive.lastSyncResult);
  } catch (e) {
    state.drive.lastSyncResult = "전송 실패: " + e.message;
    saveState();
    render();
    alert("전송 실패: " + e.message);
  }
}

async function fetchFromDrive() {
  if (!state.drive.adminToken) return alert("관리자 토큰이 필요합니다. Drive 설정에서 토큰을 입력해주세요.");
  const btn = document.getElementById("drive-fetch-btn");
  if (btn) { btn.disabled = true; btn.textContent = "가져오는 중..."; }
  try {
    const result = await postToDrive({
      type: "fetchApplications",
      adminToken: state.drive.adminToken,
    });
    if (!result.ok) throw new Error(result.error || "실패");

    const fetchedApps = result.applications || [];
    const fetchedSessions = result.sessions || [];

    // 세션 병합: 시트가 정본, 로컬 intro는 보존
    if (fetchedSessions.length) {
      const merged = fetchedSessions.map(fs => {
        const local = state.sessions.find(ls => ls.id === fs.id);
        return { ...fs, intro: local?.intro || "" };
      });
      const fetchedIds = new Set(fetchedSessions.map(s => s.id));
      const localOnly = state.sessions.filter(s => !fetchedIds.has(s.id));
      state.sessions = [...merged, ...localOnly];
    }

    // 신청 병합: ID 기준으로 시트값 우선, 로컬만 있는 건 유지
    const fetchedIds = new Set(fetchedApps.map(a => a.id));
    const localOnly = state.applications.filter(a => !fetchedIds.has(a.id));
    // 시트에서 받은 apps는 applicantId를 sheet-origin으로 지정
    const normalized = fetchedApps.map(a => ({
      ...a,
      applicantId: a.applicantId || ("sheet_" + a.id),
    }));
    state.applications = [...normalized, ...localOnly];

    state.drive.lastSyncAt = new Date().toISOString();
    state.drive.lastSyncResult = `가져옴: 신청 ${fetchedApps.length}건 · 세션 ${fetchedSessions.length}개`;
    saveState();
    render();
    alert(state.drive.lastSyncResult);
  } catch (e) {
    state.drive.lastSyncResult = "가져오기 실패: " + e.message;
    saveState();
    render();
    alert("가져오기 실패: " + e.message);
  }
}

  state.drive.enabled = document.getElementById("drive-enabled").checked;

}

// ===========================================================================
// 매칭 알고리즘
// ===========================================================================
function seniorityRange(app) {
  const y = app.seniority;
  switch (app.desiredSeniority) {
    case "similar": return [Math.max(0, y-2), y+2];
    case "senior": return [y+1, 99];
    case "junior": return [0, Math.max(0, y-1)];
    default: return null;
  }
}

function scorePair(a, b) {
  let total = 0;
  if (a.criterion === b.criterion) total += 30;
  total += subPreferenceScore(a, b);
  const diff = Math.abs(a.seniority - b.seniority);
  if (diff === 0) total += 15;
  else if (diff <= 2) total += 12;
  else if (diff <= 4) total += 8;
  else if (diff <= 6) total += 4;
  total += jobRelationScore(a.currentJob, b.currentJob);
  total += topicSimilarityScore(a.topics || [], b.topics || []);
  total += concernExperienceScore(a, b);
  return Math.min(100, total);
}

function subPreferenceScore(a, b) {
  if (a.criterion === "seniority" && b.criterion === "seniority") {
    const ar = seniorityRange(a), br = seniorityRange(b);
    const aWantsB = ar && b.seniority >= ar[0] && b.seniority <= ar[1];
    const bWantsA = br && a.seniority >= br[0] && a.seniority <= br[1];
    return (aWantsB && bWantsA) ? 30 : (aWantsB || bWantsA) ? 15 : 0;
  }
  if (a.criterion === "job" && b.criterion === "job") {
    const aWantsB = (a.desiredJobs || []).includes(b.currentJob);
    const bWantsA = (b.desiredJobs || []).includes(a.currentJob);
    return (aWantsB && bWantsA) ? 30 : (aWantsB || bWantsA) ? 15 : 0;
  }
  if (a.criterion === "topic" && b.criterion === "topic") {
    const shared = (a.topics||[]).filter(t => (b.topics||[]).includes(t));
    if (shared.length >= 2) return 30;
    if (shared.length === 1) return 20;
    for (const cluster of TOPIC_CLUSTERS) {
      if ((a.topics||[]).some(t => cluster.includes(t)) && (b.topics||[]).some(t => cluster.includes(t))) return 10;
    }
    return 0;
  }
  return 0;
}
function jobRelationScore(ja, jb) {
  if (ja === jb) return 15;
  for (const g of JOB_GROUPS) if (g.includes(ja) && g.includes(jb)) return 10;
  return 0;
}
function topicSimilarityScore(ta, tb) {
  const shared = ta.filter(t => tb.includes(t)).length;
  if (shared >= 3) return 20;
  if (shared === 2) return 14;
  if (shared === 1) return 8;
  for (const cluster of TOPIC_CLUSTERS) {
    if (ta.some(t => cluster.includes(t)) && tb.some(t => cluster.includes(t))) return 4;
  }
  return 0;
}
function tokenize(text) {
  if (!text) return new Set();
  return new Set(text.replace(/[.,]/g, " ").split(/\s+/).filter(t => t.length >= 2));
}
function concernExperienceScore(a, b) {
  let score = 0;
  const pairs = [
    [tokenize(a.concern), tokenize(b.experience)],
    [tokenize(b.concern), tokenize(a.experience)],
  ];
  for (const [c, e] of pairs) {
    if (!c.size) continue;
    let overlap = 0;
    c.forEach(t => { if (e.has(t)) overlap++; });
    if (overlap >= 2) score += 5;
    else if (overlap === 1) score += 3;
  }
  return Math.min(10, score);
}
function pairKey(a, b) { return a < b ? a+"|"+b : b+"|"+a; }
function buildScoreCache(apps) {
  const cache = {};
  for (let i=0; i<apps.length; i++) for (let j=i+1; j<apps.length; j++) {
    cache[pairKey(apps[i].id, apps[j].id)] = scorePair(apps[i], apps[j]);
  }
  return cache;
}
function avgScoreToGroup(cand, group, cache) {
  if (!group.length) return 0;
  let sum = 0;
  for (const m of group) sum += cache[pairKey(cand.id, m.id)] || 0;
  return sum / group.length;
}
function formGroups(pool, session, origin, counter, cache) {
  const remaining = [...pool];
  const groups = [];
  while (remaining.length >= session.minGroupSize) {
    let seed = remaining[0], seedScore = -1;
    for (const p of remaining) {
      let s = 0, n = 0;
      for (const q of remaining) if (q.id !== p.id) { s += cache[pairKey(p.id,q.id)]||0; n++; }
      const avg = n ? s/n : 0;
      if (avg > seedScore) { seedScore = avg; seed = p; }
    }
    const group = [seed];
    remaining.splice(remaining.indexOf(seed), 1);
    while (group.length < session.targetGroupSize && remaining.length) {
      let best = remaining[0], bestScore = -1;
      for (const p of remaining) {
        const avg = avgScoreToGroup(p, group, cache);
        if (avg > bestScore) { bestScore = avg; best = p; }
      }
      group.push(best);
      remaining.splice(remaining.indexOf(best), 1);
    }
    groups.push({
      id: "G" + String(counter.value++).padStart(3, "0"),
      origin,
      memberIds: group.map(g => g.id),
    });
  }
  return { groups, leftover: remaining };
}
function assignSession(applications, session) {
  const cache = buildScoreCache(applications);
  const counter = { value: 1 };
  const allGroups = [];
  const leftover = [];
  for (const criterion of ["seniority", "job", "topic"]) {
    const pool = applications.filter(a => a.criterion === criterion);
    if (!pool.length) continue;
    const { groups, leftover: rem } = formGroups(pool, session, "criterion:" + criterion, counter, cache);
    allGroups.push(...groups);
    leftover.push(...rem);
  }
  let finalUnassigned = leftover;
  if (leftover.length >= session.minGroupSize) {
    const { groups, leftover: rem2 } = formGroups(leftover, session, "mixed", counter, cache);
    allGroups.push(...groups);
    finalUnassigned = rem2;
  }
  const stillUnassigned = [];
  for (const p of finalUnassigned) {
    const sortedGroups = [...allGroups].sort((g1, g2) => {
      const m1 = g1.memberIds.map(id => applications.find(a => a.id === id));
      const m2 = g2.memberIds.map(id => applications.find(a => a.id === id));
      return avgScoreToGroup(p, m2, cache) - avgScoreToGroup(p, m1, cache);
    });
    let placed = false;
    for (const g of sortedGroups) {
      if (g.memberIds.length < session.maxGroupSize) {
        g.memberIds.push(p.id);
        placed = true;
        break;
      }
    }
    if (!placed) stillUnassigned.push(p);
  }
  return { groups: allGroups, unassigned: stillUnassigned.map(p => p.id), cache };
}
function groupMetrics(group, cache) {
  const ids = group.memberIds;
  if (ids.length < 2) return { avg: 0, min: 0 };
  const scores = [];
  for (let i=0; i<ids.length; i++) for (let j=i+1; j<ids.length; j++) {
    scores.push(cache[pairKey(ids[i], ids[j])] || 0);
  }
  return { avg: scores.reduce((a,b) => a+b, 0) / scores.length, min: Math.min(...scores) };
}

function createNewSession() {
  const s = newBlankSession();
  state.sessions.push(s);
  uiState.editingSessionId = s.id;
  saveState();
  render();
}

function saveSessionEdit(sessionId) {
  const target = parseInt(document.getElementById("s-target").value);
  const min = parseInt(document.getElementById("s-min").value);
  const max = parseInt(document.getElementById("s-max").value);
  if (min > target || target > max) {
    return alert("그룹 크기 관계가 맞지 않습니다.\n최소 ≤ 목표 ≤ 최대");
  }
  const idx = state.sessions.findIndex(s => s.id === sessionId);
  if (idx < 0) return;
  const updated = {
    ...state.sessions[idx],
    name: document.getElementById("s-name").value.trim() || state.sessions[idx].name,
    date: document.getElementById("s-date").value,
    time: document.getElementById("s-time").value.trim(),
    location: document.getElementById("s-location").value.trim(),
    intro: document.getElementById("s-intro").value.trim(),
    targetGroupSize: target,
    minGroupSize: min,
    maxGroupSize: max,
    applyDeadline: document.getElementById("s-deadline").value,
    confirmDate: document.getElementById("s-confirm").value,
  };
  state.sessions[idx] = updated;
  uiState.editingSessionId = null;
  saveState();
  render();
  pushSessionToDrive(updated);
}

function deleteSession(sessionId) {
  const session = state.sessions.find(s => s.id === sessionId);
  if (!session) return;
  const appCount = state.applications.filter(a => a.sessionId === sessionId).length;
  const msg = appCount > 0
    ? `[${session.name}] 세션과 관련 신청 ${appCount}건, 그룹 배정 데이터를 모두 삭제합니다. 계속하시겠습니까?`
    : `[${session.name}] 세션을 삭제하시겠습니까?`;
  if (!confirm(msg)) return;
  state.sessions = state.sessions.filter(s => s.id !== sessionId);
  state.applications = state.applications.filter(a => a.sessionId !== sessionId);
  delete state.groups[sessionId];
  delete state.confirmed[sessionId];
  if (uiState.adminSelectedSessionId === sessionId) uiState.adminSelectedSessionId = null;
  if (uiState.applyingSessionId === sessionId) uiState.applyingSessionId = null;
  saveState();
  render();
}

function sessionStatusTag(session) {
  if (state.confirmed[session.id]) return '<span class="tag tag-ok">그룹 확정</span>';
  if (state.groups[session.id]) return '<span class="tag tag-warn">그룹 배정 중</span>';
  const today = new Date().toISOString().slice(0, 10);
  if (session.applyDeadline && session.applyDeadline < today) return '<span class="tag">신청 마감</span>';
  return '<span class="tag tag-ok">신청 가능</span>';
}

function renderUserView() {
  const root = document.getElementById("view-user");

  let html = renderProfileCard();

  if (!state.sessions.length) {
    html += `<div class="empty">현재 등록된 게더링이 없습니다.<br>관리자가 게더링을 등록하면 표시됩니다.</div>`;
    root.innerHTML = html;
    return;
  }

  // 신청 가능한 세션 목록
  html += `<div class="card"><h3>게더링 목록</h3>
    <p class="section-desc">참가하고 싶은 게더링을 선택해 신청하세요.</p>`;
  for (const s of state.sessions) {
    html += renderUserSessionCard(s);
  }
  html += `</div>`;

  // 현재 신청 폼이 열려있는 세션
  if (state.me && uiState.applyingSessionId) {
    const targetSession = state.sessions.find(s => s.id === uiState.applyingSessionId);
    if (targetSession) {
      const existing = state.applications.find(a => a.applicantId === state.me.id && a.sessionId === targetSession.id);
      html += renderApplicationForm(targetSession, existing);
    }
  }

  // 내 신청 내역
  if (state.me) {
    const myApps = state.applications.filter(a => a.applicantId === state.me.id);
    if (myApps.length) {
      html += `<div class="card"><h3>내 신청 내역</h3>`;
      for (const app of myApps) {
        html += renderMyApplicationBrief(app);
      }
      html += `</div>`;
      for (const app of myApps) {
        if (state.confirmed[app.sessionId] && state.groups[app.sessionId]) {
          html += renderMyGroup(app);
        }
      }
    }
  }

  root.innerHTML = html;
  attachFormHandlers();
}

function saveProfile() {
  const name = document.getElementById("p-name").value.trim();
  const email = document.getElementById("p-email").value.trim();

  if (!name) return alert("이름을 입력해주세요.");

  state.me = {

function renderCriterionFields(criterion, existing) {
  if (criterion === "seniority") {
    return `
      <div class="form-row">
        <label>만나고 싶은 연차</label>
        <div class="radio-group">
          ${SENIORITY_OPTIONS.map(o => `
            <label class="radio-card ${existing?.desiredSeniority === o.value ? "selected":""}" data-desired="${o.value}">
              <input type="radio" name="f-desiredSeniority" value="${o.value}" ${existing?.desiredSeniority === o.value ? "checked":""}>
              <div class="radio-card-title">${o.label}</div>
            </label>
          `).join("")}
        </div>
      </div>
    `;
  }
  if (criterion === "job") {
    return `
      <div class="form-row">
        <label>만나고 싶은 직무 (여러 개 선택 가능)</label>
        <div class="chip-group">
          ${JOB_LIST.map(j => `
            <div class="chip ${(existing?.desiredJobs || []).includes(j) ? "selected":""}"
                 data-job="${j}" onclick="toggleChip(this, 'job')">${j}</div>
          `).join("")}
        </div>
      </div>
    `;
  }
  if (criterion === "topic") {
    return `
      <div class="form-row">
        <label>관심 주제 (최대 3개)</label>
        <div class="chip-group">
          ${TOPIC_LIST.map(t => `
            <div class="chip ${(existing?.topics || []).includes(t) ? "selected":""}"
                 data-topic="${t}" onclick="toggleChip(this, 'topic')">${t}</div>
          `).join("")}
        </div>
      </div>
    `;
  }
  return "";
}

function attachFormHandlers() {
  document.querySelectorAll(".radio-card[data-criterion]").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".radio-card[data-criterion]").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      el.querySelector("input").checked = true;
      const existing = getFormSnapshot();
      document.getElementById("criterion-fields").innerHTML = renderCriterionFields(el.dataset.criterion, existing);
      attachSubHandlers();
    });
  });
  const checked = document.querySelector("input[name='f-criterion']:checked");
  if (checked) {
    const existing = getFormSnapshot();
    document.getElementById("criterion-fields").innerHTML = renderCriterionFields(checked.value, existing);
    attachSubHandlers();
  }
}
function attachSubHandlers() {
  document.querySelectorAll(".radio-card[data-desired]").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".radio-card[data-desired]").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      el.querySelector("input").checked = true;
    });
  });
}
function toggleChip(el, type) {
  if (type === "topic") {
    const selectedCount = document.querySelectorAll('.chip.selected[data-topic]').length;
    if (!el.classList.contains("selected") && selectedCount >= 3) {
      alert("최대 3개까지 선택할 수 있어요.");
      return;
    }
  }
  el.classList.toggle("selected");
}
function getFormSnapshot() {
  const criterion = document.querySelector("input[name='f-criterion']:checked")?.value;
  return {
    criterion,
    desiredSeniority: document.querySelector("input[name='f-desiredSeniority']:checked")?.value,
    desiredJobs: [...document.querySelectorAll('.chip.selected[data-job]')].map(c => c.dataset.job),
    topics: [...document.querySelectorAll('.chip.selected[data-topic]')].map(c => c.dataset.topic),
  };
}

function submitApplication(sessionId, editing) {
  const me = state.me;
  if (!me) return alert("먼저 내 정보를 등록해주세요.");

  const seniority = parseInt(document.getElementById("f-seniority").value);
  const currentJob = document.getElementById("f-currentJob").value;
  const criterion = document.querySelector("input[name='f-criterion']:checked")?.value;
  const concern = document.getElementById("f-concern").value.trim();
  const experience = document.getElementById("f-experience").value.trim();
  const disclose = [...document.querySelectorAll(".f-disclose:checked")].map(c => c.value);

  if (isNaN(seniority) || seniority < 0) return alert("연차를 정확히 입력해주세요.");
  if (!currentJob) return alert("현재 직무를 선택해주세요.");
  if (!criterion) return alert("매칭 기준을 선택해주세요.");

  const existing = state.applications.find(a => a.applicantId === me.id && a.sessionId === sessionId);
  const app = {
    id: existing?.id || genId("a"),
    sessionId,
    applicantId: me.id,
    applicantName: me.name,
    applicantEmail: me.email,
    applicantCompany: me.company,
    seniority, currentJob, criterion,
    desiredSeniority: document.querySelector("input[name='f-desiredSeniority']:checked")?.value || null,
    desiredJobs: [...document.querySelectorAll('.chip.selected[data-job]')].map(c => c.dataset.job),
    topics: [...document.querySelectorAll('.chip.selected[data-topic]')].map(c => c.dataset.topic),
    concern, experience, disclose,
    createdAt: existing?.createdAt || new Date().toISOString(),
  };

  if (criterion === "seniority" && !app.desiredSeniority) return alert("만나고 싶은 연차를 선택해주세요.");
  if (criterion === "job" && !app.desiredJobs.length) return alert("만나고 싶은 직무를 1개 이상 선택해주세요.");
  if (criterion === "topic" && !app.topics.length) return alert("관심 주제를 1개 이상 선택해주세요.");

  if (existing) {
    const idx = state.applications.findIndex(a => a.id === existing.id);
    state.applications[idx] = app;
  } else {
    state.applications.push(app);
  }
  // 이 세션의 배정 초기화
  delete state.groups[sessionId];
  delete state.confirmed[sessionId];
  uiState.applyingSessionId = null;
  saveState();
  render();
  pushApplicationToDrive(app);
}

function cancelApplication(sessionId) {
  if (!confirm("이 세션의 신청을 취소하시겠습니까?")) return;
  const me = state.me;
  if (!me) return;
  state.applications = state.applications.filter(a => !(a.applicantId === me.id && a.sessionId === sessionId));
  delete state.groups[sessionId];
  delete state.confirmed[sessionId];
  uiState.applyingSessionId = null;
  saveState();
  render();
}

function renderMyGroup(app) {

  let html = `

async function submitAdminPin() {
  const pin = document.getElementById("admin-pin-1").value;
  if (!pin || pin.length < 4) return alert("PIN은 4자 이상이어야 합니다.");
  if (!adminPinExists()) {
    const confirmPin = document.getElementById("admin-pin-2").value;
    if (pin !== confirmPin) return alert("두 PIN이 일치하지 않습니다.");
    await setAdminPin(pin);
  } else {
    if (!(await verifyAdminPin(pin))) return alert("PIN이 일치하지 않습니다.");
  }
  render();
}

            return `

                <div class="member-info">
                  <div class="member-name">${escapeHtml(a.applicantName)}</div>
                  <div class="member-meta">${a.seniority}년 · ${escapeHtml(a.currentJob)} · ${criterionLabel(a.criterion)}</div>
                </div>

function filterApplicants(apps, session) {
  const f = uiState.filter;
  const keyword = (f.keyword || "").trim().toLowerCase();
  const assignedIds = new Set((state.groups[session.id] || []).flatMap(g => g.memberIds));

  return apps.filter(a => {
    if (f.criterion !== "all" && a.criterion !== f.criterion) return false;
    if (f.groupStatus === "assigned" && !assignedIds.has(a.id)) return false;
    if (f.groupStatus === "unassigned" && assignedIds.has(a.id)) return false;
    if (keyword) {
      const hay = [
        a.applicantName, a.applicantEmail, a.applicantCompany,
        a.currentJob, a.concern, a.experience,
        ...(a.desiredJobs || []), ...(a.topics || []),
      ].join(" ").toLowerCase();
      if (!hay.includes(keyword)) return false;
    }
    return true;
  });
}

function setFilter(key, value) {
  uiState.filter[key] = value;
  render();
}
function clearFilter() {
  uiState.filter = { keyword: "", criterion: "all", groupStatus: "all" };
  render();
}

function criterionLabel(c) { return {seniority:"연차", job:"직무", topic:"주제"}[c]; }

function runAssignment(sessionId) {
  const session = state.sessions.find(s => s.id === sessionId);
  const apps = state.applications.filter(a => a.sessionId === sessionId);
  if (state.confirmed[sessionId]) {
    if (!confirm("확정된 그룹을 해제하고 다시 배정하시겠습니까?")) return;
    delete state.confirmed[sessionId];
  }
  const result = assignSession(apps, session);
  state.groups[sessionId] = result.groups;
  saveState();
  render();
}

function moveMember(sessionId, appId, target) {
  if (!target) return;
  const groups = state.groups[sessionId];
  if (!groups) return;
  for (const g of groups) g.memberIds = g.memberIds.filter(id => id !== appId);
  if (target !== "__unassign") {
    const g = groups.find(g => g.id === target);
    if (g) g.memberIds.push(appId);
  }
  state.groups[sessionId] = groups.filter(g => g.memberIds.length > 0);
  saveState();
  render();
}

function confirmGroups(sessionId) {
  const session = state.sessions.find(s => s.id === sessionId);
  const groups = state.groups[sessionId];
  const apps = state.applications.filter(a => a.sessionId === sessionId);
  const warnings = [];
  const smallGroups = groups.filter(g => g.memberIds.length < session.minGroupSize);
  const bigGroups = groups.filter(g => g.memberIds.length > session.maxGroupSize);
  if (smallGroups.length) warnings.push(`정원 미달 그룹 ${smallGroups.length}개`);
  if (bigGroups.length) warnings.push(`정원 초과 그룹 ${bigGroups.length}개`);
  const assignedIds = new Set(groups.flatMap(g => g.memberIds));
  const unassigned = apps.filter(a => !assignedIds.has(a.id));
  if (unassigned.length) warnings.push(`미배정 ${unassigned.length}명`);

  const msg = warnings.length
    ? "다음 항목을 확인해주세요:\n\n" + warnings.map(w => "· " + w).join("\n") + "\n\n그래도 확정하시겠습니까?"
    : "그룹을 확정하고 사용자에게 결과를 공개합니다. 계속하시겠습니까?";
  if (!confirm(msg)) return;
  state.confirmed[sessionId] = true;
  saveState();
  render();
}

function unconfirmGroups(sessionId) {
  if (!confirm("확정을 해제합니다. 사용자에게 그룹 결과가 더 이상 보이지 않게 됩니다.")) return;
  delete state.confirmed[sessionId];
  saveState();
  render();
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function escapeAttr(s) {
  if (s == null) return "";
  return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
}

// ===========================================================================
// CSV 내보내기
// ===========================================================================
function csvCell(v) {
  const s = v == null ? "" : String(v);
  return '"' + s.replace(/"/g, '""') + '"';
}
function csvLine(row) { return row.map(csvCell).join(","); }
function downloadCsv(filename, rows) {
  // BOM 붙여 엑셀 한글 깨짐 방지
  const content = "﻿" + rows.map(csvLine).join("\r\n");
  const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}
function safeFilename(s) {
  return String(s || "session").replace(/[\/\\:*?"<>|]/g, "_").slice(0, 60);
}
function isoDateStamp() {
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
}

function exportApplicantsCsv(sessionId) {
  const session = state.sessions.find(s => s.id === sessionId);
  const apps = state.applications.filter(a => a.sessionId === sessionId);
  const groups = state.groups[sessionId] || [];
  const headers = [
    "이름","이메일","소속","연차","현재 직무","매칭 기준",
    "희망 연차","희망 직무","관심 주제","고민","공유 경험",
    "공개 정보","그룹","신청 일시"
  ];
  const rows = [headers];
  for (const a of apps) {
    const group = groups.find(g => g.memberIds.includes(a.id));
    rows.push([
      a.applicantName, a.applicantEmail, a.applicantCompany,
      a.seniority + "년", a.currentJob, criterionLabel(a.criterion),
      SENIORITY_OPTIONS.find(o => o.value === a.desiredSeniority)?.label || "",
      (a.desiredJobs || []).join(", "),
      (a.topics || []).join(", "),
      a.concern, a.experience,
      (a.disclose || []).join(", "),
      group ? group.id : "미배정",
      a.createdAt,
    ]);
  }
  downloadCsv(`${safeFilename(session.name)}_신청자_${isoDateStamp()}.csv`, rows);
}

function exportGroupsCsv(sessionId) {
  const session = state.sessions.find(s => s.id === sessionId);
  const groups = state.groups[sessionId] || [];
  const cache = buildScoreCache(state.applications.filter(a => a.sessionId === sessionId));
  const headers = [
    "그룹","그룹 유형","그룹 크기","그룹 평균 점수","그룹 최저 점수",
    "이름","이메일","소속","연차","현재 직무","매칭 기준",
    "관심 주제","고민"
  ];
  const rows = [headers];
  for (const g of groups) {
    const m = groupMetrics(g, cache);
    const originLabel = g.origin.replace("criterion:", "").replace("mixed", "혼합");
    for (const id of g.memberIds) {
      const a = state.applications.find(app => app.id === id);
      if (!a) continue;
      rows.push([
        g.id, originLabel, g.memberIds.length,
        m.avg.toFixed(1), m.min.toFixed(1),
        a.applicantName, a.applicantEmail, a.applicantCompany,
        a.seniority + "년", a.currentJob, criterionLabel(a.criterion),
        (a.topics || []).join(", "), a.concern,
      ]);
    }
  }
  // 미배정
  const assigned = new Set(groups.flatMap(g => g.memberIds));
  const unassigned = state.applications.filter(a => a.sessionId === sessionId && !assigned.has(a.id));
  for (const a of unassigned) {
    rows.push([
      "미배정", "", "", "", "",
      a.applicantName, a.applicantEmail, a.applicantCompany,
      a.seniority + "년", a.currentJob, criterionLabel(a.criterion),
      (a.topics || []).join(", "), a.concern,
    ]);
  }
  downloadCsv(`${safeFilename(session.name)}_그룹_${isoDateStamp()}.csv`, rows);
}

  samples.forEach((row, i) => {

  saveState();
  render();
}

function setView(view) {
  document.getElementById("nav-user").classList.toggle("active", view === "user");
  document.getElementById("nav-admin").classList.toggle("active", view === "admin");
  document.getElementById("view-user").classList.toggle("hidden", view !== "user");
  document.getElementById("view-admin").classList.toggle("hidden", view !== "admin");
  render();
}

function render() {
  renderUserView();
  renderAdminView();
}

render();
